<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .rectangle {
            width: 200px;
            height: 100px;
            border: 1px solid black;
            position: relative;
        }

        .rectangle::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 10px;
            background-color: white;
            top: -5px;
            left: 15px;
            z-index: 1;
        }
    </style>
    <title>Clip Path Example</title>
</head>
<body>
    <div class="rectangle"></div>
</body>
</html>
